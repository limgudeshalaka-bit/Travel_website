<!DOCTYPE html>
<html>
<head>
<title>Travel Booking</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#0c8db3;
color:white;
text-align:center;
padding:20px;
}

nav{
background:#333;
text-align:center;
padding:10px;
}

nav a{
color:white;
margin:15px;
text-decoration:none;
font-weight:bold;
}

.container{
display:flex;
justify-content:center;
padding:40px;
}

form{
background:white;
padding:30px;
width:320px;
box-shadow:0 0 10px gray;
border-radius:8px;
}

input, select{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#0c8db3;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#066c85;
}

footer{
background:#333;
color:white;
text-align:center;
padding:10px;
}

</style>

<script>

function bookingMessage(){
alert("Your booking is successful!");
}

</script>

</head>

<body>

<header>
<h1>Travel Booking</h1>
<p>Book your dream trip</p>
</header>

<nav>
<a href="index.html">Home</a>
<a href="destination.html">Destinations</a>
<a href="booking.html">Booking</a>
<a href="contact.html">Contact</a>
</nav>

<div class="container">

<form onsubmit="bookingMessage()">

<h2>Book Your Trip</h2>

<input type="text" placeholder="Your Name" required>

<input type="email" placeholder="Your Email" required>

<select required>
<option>Select Destination</option>
<option>Goa</option>
<option>Manali</option>
<option>Paris</option>
<option>Dubai</option>
<option>Singapore</option>
</select>

<input type="date" required>

<input type="number" placeholder="Number of People">

<button type="submit">Book Now</button>

</form>

</div>

<footer>
© Travel and Tourism Project
</footer>

</body>
</html>
